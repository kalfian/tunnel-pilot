name: Auto Tag on Version Bump

on:
  push:
    branches: [master]
    paths:
      - pubspec.yaml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version vs latest tag
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "")

          echo "current=v$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ "v$CURRENT" = "$LATEST_TAG" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version v$CURRENT matches latest tag — skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: $LATEST_TAG -> v$CURRENT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.current }}"
          git tag "$TAG"

          if [ -n "$PAT_TOKEN" ]; then
            # Push with PAT so the tag triggers release.yml
            git push "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git" "$TAG"
            echo "Pushed tag $TAG with PAT (will trigger release workflow)"
          else
            git push origin "$TAG"
            echo "::warning::PAT_TOKEN not set — tag pushed with GITHUB_TOKEN, release workflow will NOT be triggered. Add a PAT_TOKEN secret to enable auto-release."
          fi
