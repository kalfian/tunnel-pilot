name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter test

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/macos/Build/Products/Release/Tunnel Pilot.app"

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Tunnel Pilot.app"
          DMG_NAME="TunnelPilot-${{ github.ref_name }}-macos"
          BG_IMG="assets/dmg/background.png"

          # Create temp DMG content
          mkdir -p dmg_content/.background
          cp -R "$APP_PATH" dmg_content/
          ln -s /Applications dmg_content/Applications
          cp "$BG_IMG" dmg_content/.background/background.png

          # Create writable DMG
          hdiutil create -volname "Tunnel Pilot" -srcfolder dmg_content -ov -format UDRW "${DMG_NAME}-rw.dmg"

          # Mount and configure layout via AppleScript
          DEVICE=$(hdiutil attach "${DMG_NAME}-rw.dmg" | grep "/Volumes/Tunnel Pilot" | awk '{print $1}')
          sleep 2

          osascript << 'APPLESCRIPT'
          tell application "Finder"
            tell disk "Tunnel Pilot"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {100, 100, 700, 500}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 80
              set background picture of theViewOptions to file ".background:background.png"
              set position of item "Tunnel Pilot.app" of container window to {150, 220}
              set position of item "Applications" of container window to {450, 220}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          # Unmount
          hdiutil detach "$DEVICE"

          # Convert to compressed read-only DMG
          hdiutil convert "${DMG_NAME}-rw.dmg" -format UDZO -o "${DMG_NAME}.dmg"
          rm "${DMG_NAME}-rw.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: TunnelPilot-${{ github.ref_name }}-macos.dmg

  release:
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: changelog
        run: |
          # Extract version from tag (v0.0.1 -> 0.0.1)
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md)
          # Write to file for the release body
          echo "$NOTES" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tunnel Pilot ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: artifacts/*.dmg
