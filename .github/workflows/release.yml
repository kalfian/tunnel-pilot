name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter test

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/macos/Build/Products/Release/Tunnel Pilot.app"

      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          mkdir -p dmg_content
          cp -R "Tunnel Pilot.app" dmg_content/
          ln -s /Applications dmg_content/Applications
          hdiutil create -volname "Tunnel Pilot" -srcfolder dmg_content -ov -format UDZO "TunnelPilot-${{ github.ref_name }}-macos.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/Build/Products/Release/TunnelPilot-${{ github.ref_name }}-macos.dmg

  release:
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: changelog
        run: |
          # Extract version from tag (v0.0.1 -> 0.0.1)
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md)
          # Write to file for the release body
          echo "$NOTES" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tunnel Pilot ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: artifacts/*.dmg
