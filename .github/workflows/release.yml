name: Release

on:
  push:
    branches: [master]
    paths:
      - pubspec.yaml
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    if: ${{ !inputs.tag }}
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version vs latest tag
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "")

          echo "current=v$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ "v$CURRENT" = "$LATEST_TAG" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version v$CURRENT matches latest tag — skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: $LATEST_TAG -> v$CURRENT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.current }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed tag $TAG"

  resolve-tag:
    runs-on: ubuntu-latest
    needs: [auto-tag]
    if: ${{ always() && (inputs.tag || needs.auto-tag.outputs.changed == 'true') }}
    outputs:
      release_tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        run: |
          TAG="${{ inputs.tag || needs.auto-tag.outputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

  test:
    runs-on: macos-latest
    needs: [resolve-tag]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.release_tag }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter test

  build-macos:
    runs-on: macos-latest
    needs: [resolve-tag, test]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.release_tag }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - "build/macos/Build/Products/Release/Tunnel Pilot.app"

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Tunnel Pilot.app"
          DMG_NAME="TunnelPilot-${{ needs.resolve-tag.outputs.release_tag }}-macos"
          BG_IMG="assets/dmg/background.png"

          mkdir -p dmg_stage/.background
          cp -R "$APP_PATH" dmg_stage/
          ln -s /Applications dmg_stage/Applications
          cp "$BG_IMG" dmg_stage/.background/background.png

          hdiutil create -volname "Tunnel Pilot" -srcfolder dmg_stage -ov -format UDRW "${DMG_NAME}-rw.dmg"

          DEVICE=$(hdiutil attach "${DMG_NAME}-rw.dmg" | grep "/Volumes/Tunnel Pilot" | awk '{print $1}')
          sleep 2

          osascript << 'APPLESCRIPT'
          tell application "Finder"
            tell disk "Tunnel Pilot"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {100, 100, 700, 620}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 80
              set background picture of theViewOptions to file ".background:background.png"
              set position of item "Tunnel Pilot.app" of container window to {170, 250}
              set position of item "Applications" of container window to {430, 250}
              set position of item ".background" of container window to {80, 60}
              set position of item ".fseventsd" of container window to {520, 60}
              close
              open
              update without registering applications
              delay 3
              close
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$DEVICE"
          hdiutil convert "${DMG_NAME}-rw.dmg" -format UDZO -o "${DMG_NAME}.dmg"
          rm "${DMG_NAME}-rw.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: TunnelPilot-${{ needs.resolve-tag.outputs.release_tag }}-macos.dmg

  build-windows:
    runs-on: windows-latest
    needs: [resolve-tag, test]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.release_tag }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows

      - name: Create ZIP
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "TunnelPilot-${{ needs.resolve-tag.outputs.release_tag }}-windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: TunnelPilot-${{ needs.resolve-tag.outputs.release_tag }}-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    needs: [resolve-tag, test]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.release_tag }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libnotify-dev \
            ninja-build \
            cmake \
            clang \
            pkg-config \
            libblkid-dev \
            liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build linux

      - name: Create tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../TunnelPilot-${{ needs.resolve-tag.outputs.release_tag }}-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: TunnelPilot-${{ needs.resolve-tag.outputs.release_tag }}-linux.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-macos, build-windows, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.release_tag }}

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG="${{ needs.resolve-tag.outputs.release_tag }}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md)
          echo "$NOTES" > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.release_tag }}
          name: Tunnel Pilot ${{ needs.resolve-tag.outputs.release_tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.release_tag, 'beta') || contains(needs.resolve-tag.outputs.release_tag, 'alpha') }}
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.tar.gz

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi

          VERSION="${{ needs.resolve-tag.outputs.release_tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          NOTES=$(cat release_notes.md | head -50)

          # Escape JSON special characters
          NOTES_ESCAPED=$(echo "$NOTES" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          curl -fsSL -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Tunnel Pilot ${VERSION} Released\",
                \"url\": \"${RELEASE_URL}\",
                \"description\": ${NOTES_ESCAPED},
                \"color\": 31743,
                \"fields\": [
                  { \"name\": \"Downloads\", \"value\": \"[GitHub Releases](${RELEASE_URL})\", \"inline\": true },
                  { \"name\": \"Platform\", \"value\": \"macOS · Windows · Linux\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Tunnel Pilot — SSH Local Port Forwarding Manager\" }
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
