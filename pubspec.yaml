name: tunnel_pilot
description: "A cross-platform SSH local port forwarding manager that lives in your system tray."
publish_to: 'none'
version: 0.1.1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  system_tray: ^2.0.3
  dartssh2: ^2.13.0
  window_manager: ^0.4.3
  provider: ^6.1.5
  launch_at_startup: ^0.3.1
  path_provider: ^2.1.5
  file_picker: ^8.3.7
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
