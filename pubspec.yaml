name: tunnel_pilot
description: "A cross-platform SSH local port forwarding manager that lives in your system tray."
publish_to: 'none'
version: 1.2.1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  system_tray: ^2.0.3
  dartssh2: ^2.13.0
  window_manager: ^0.5.1
  provider: ^6.1.5
  launch_at_startup: ^0.5.1
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  uuid: ^3.0.7
  package_info_plus: ^9.0.0
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
